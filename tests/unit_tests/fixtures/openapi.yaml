openapi: 3.0.0
info:
  title: V0 Semantic layer API
  version: 1.0.11
  contact:
    name: Андрей Абакин
    url: https://addressbook/search/profile/1763632
    email: abakin.a.v@sberbank.ru
  description: Semantic layer API for EPMPlatform
servers:
  - url: https://ci00163863-epmp-sndbx.apps.dev-terra000004-idm.ocp.delta.sbrf.ru
    description: DEV стенд
  - url: https://ci04763767-semlayer.apps.ift-terra000039-edb.ocp.delta.sbrf.ru
    description: IFT стенд
paths:
  /api/internal/health_сheck:
    get:
      tags:
        - internal
      summary: Health Check
      operationId: healthCheckApiInternalHhealthCheckGet
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: string
                pattern: "ok"
  /api/internal/semanticPermissions:
    get:
      tags:
        - internal
      summary: Get Semantic Permissions
      operationId: getSemanticPermissions
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                maxItems: 1000
                items:
                  $ref: "#/components/schemas/permission"
  /api/internal/{dimensionName}/getValues:
    post:
      requestBody:
        description: Фильтр
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/valuesFiltersRequest"
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
      tags:
        - internal
      summary: Get dimension values from MDM
      operationId: getValues
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/valuesDimensionResponse"
                    maxItems: 10000
                  pagination:
                    $ref: "#/components/schemas/pagination"
                required:
                  - data
    parameters:
      - $ref: "#/components/parameters/dimensionName"
  /api/internal/tenants/{tenantName}/changeObjectStatus:
    post:
      tags:
        - internal
      summary: Change object status in Model
      operationId: changeObjectStatusInModel
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/objectStatus"
              maxItems: 1000
              uniqueItems: true
      responses:
        "200":
          description: Изменение статуса объекта в модели
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/respObjectStatus"
    parameters:
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
      tags:
        - v0
      summary: Get all tenants
      operationId: getTenants
      responses:
        "200":
          description: Список всех тенантов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/tenant"
                maxItems: 1000
                uniqueItems: true
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Create tenant
      operationId: createTenant
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tenant"
          description: Тенант создан
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Тенант уже существует
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/tenant"
        description: New tenant
  /api/v0/tenants/{tenantName}:
    get:
      tags:
        - v0
      summary: Get tenant by name
      operationId: getTenantByName
      responses:
        "200":
          description: Тенант найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tenant"
        "500":
          $ref: "#/components/responses/unexpectedError"
    delete:
      tags:
        - v0
      summary: Delete tenant by name
      operationId: deleteTenantByName
      responses:
        "200":
          description: Тенант `tenantName` удалена
        "404":
          description: Тенант `tenantName` не найден
        "500":
          $ref: "#/components/responses/unexpectedError"
    patch:
      tags:
        - v0
      summary: Change tenant by name
      operationId: changeTenantByName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tenant"
          description: Тенант `tenantName` изменен
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Тенант `tenantName` не найден
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/tenantEdit"
    parameters:
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/search/objects:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
        - name: query
          description: Поиск фрагмент технического имени или описания
          schema:
            $ref: "#/components/schemas/searchQuery"
          in: query
          required: True
        - name: type
          description: Тип объекта для фильтрации
          schema:
            $ref: "#/components/schemas/searchType"
          in: query
          required: false
        - name: modelName
          description: Имя модели для фильтрации
          schema:
            $ref: "#/components/schemas/modelName"
          in: query
          required: false
      tags:
        - v0
      summary: search for objects
      operationId: searchObjects
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/searchResponse"
                maxItems: 1000
                uniqueItems: true
          description: Результаты поиска
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Тенант или модель не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
    parameters:
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/search/objectsLinks/{objectName}:
    get:
      parameters:
        - example: as_fp
          name: name
          description: Техническое имя объекта
          schema:
            $ref: "#/components/schemas/objectName64"
          in: query
          required: true
        - name: type
          description: Тип объекта для фильтрации
          schema:
            $ref: "#/components/schemas/searchType"
          in: query
          required: false
      tags:
        - v0
      summary: search for objects links
      operationId: searchObjectsLinks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/objectLinks"
          description: Результаты поиска
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Связь не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
    parameters:
      - $ref: "#/components/parameters/tenantName"
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/objectName"
  /api/v0/tenants/{tenantName}/databases/:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
      tags:
        - v0
      summary: Get all databases
      operationId: getDatabases
      responses:
        "200":
          description: Список всех баз данных
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/database"
                maxItems: 1000
                uniqueItems: true
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Create database
      operationId: createDatabase
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/database"
          description: База данных создана
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: База данных уже существует
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/database"
        description: New database
    parameters:
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/databases/{databaseName}:
    get:
      tags:
        - v0
      summary: Get database by name
      operationId: getDatabaseByName
      responses:
        "200":
          description: |
            База данных `databaseName` - необходимые параметры подключения 
            - тип базы данных
            - хост базы данных 
            - порт
            - протокол подключения
            - SQL диалект
            - Флаг защищённости подключения
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/database"
        "500":
          $ref: "#/components/responses/unexpectedError"
    delete:
      tags:
        - v0
      summary: Delete database by name
      operationId: deleteDatabaseByName
      responses:
        "200":
          description: База данных `databaseName` удалена
        "404":
          description: База данных `databaseName` не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
    patch:
      tags:
        - v0
      summary: Change database by name
      operationId: changeDatabaseByName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/database"
          description: База данных `databaseName` изменена
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: База данных `databaseName` не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/databaseEdit"
    parameters:
      - $ref: "#/components/parameters/databaseName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
      tags:
        - v0
      summary: Get all models
      operationId: getModels
      responses:
        "200":
          description: Список всех моделей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/model"
                maxItems: 1000
                uniqueItems: true
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Create model
      operationId: createModel
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model"
          description: Модель создана
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Модель уже существует
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/model"
        description: New model
    parameters:
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}:
    get:
      tags:
        - v0
      summary: Get model by name
      operationId: getModelByName
      responses:
        "200":
          description: |
            Модель `modelName` - совокупность 
            - признаков
            - показателей 
            - хранилищ
            - композитов
            - других объектов
            принадлежащей одной области системы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model"
        "500":
          $ref: "#/components/responses/unexpectedError"
    delete:
      tags:
        - v0
      summary: Delete model by name
      operationId: deleteModelByName
      responses:
        "200":
          description: Модель `modelName` удалена
        "404":
          description: Модель `modelName` не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
    patch:
      tags:
        - v0
      summary: Change model
      operationId: changeModelByName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/model"
          description: Модель `modelName` изменена
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Модель `modelName` не найдена
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/modelEdit"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/synchronization/dataStorages:
    post:
      tags:
        - v0
      summary: Create data storages In Database From Meta
      operationId: createDataStoragesInDatabaseFromMeta
      responses:
        "200":
          description: Обновленные модели
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/synchronizationResult"
                maxItems: 1000
                uniqueItems: true
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
      - $ref: "#/components/parameters/checkPossibleToDropMode"
  /api/v0/tenants/{tenantName}/models/{modelName}/synchronization/dataStorages/{dataStorageName}:
    post:
      tags:
        - v0
      summary: Create data storages In Database From Meta
      operationId: createDataStorageInDatabaseFromMeta
      responses:
        "200":
          description: Обновленная таблица
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/synchronizationResult"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
      - $ref: "#/components/parameters/dataStorageName"
  /api/v0/tenants/{tenantName}/models/{modelName}/synchronization/composites/:
    post:
      tags:
        - v0
      summary: Create Composites In Database From Meta
      operationId: createCompositesInDatabaseFromMeta
      description: Обновить все view в базе данных
      responses:
        "200":
          description: Обновленные view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/respCopyObject"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/synchronization/composites/{compositeName}:
    post:
      tags:
        - v0
      summary: Create Composite In Database From Meta
      operationId: createCompositeInDatabaseFromMeta
      description: Обновить view в базе данных
      responses:
        "200":
          description: Обновленные view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/synchronizationResult"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
      - $ref: "#/components/parameters/compositeName"
  /api/v0/tenants/{tenantName}/dimensions/copyToAnotherModel:
    post:
      tags:
        - v0
      summary: Copy dimension to another model
      operationId: copyDimensionToAnotherModel
      description: New model for dimension
      parameters:
        - $ref: "#/components/parameters/tenantName"
        - $ref: "#/components/parameters/copyAttributes"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/requestCopyObject"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/respCopyObject"
          description: Измерение создано в указанных моделях
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
          description: Измерение уже существует в модели `modelName`
  /api/v0/tenants/{tenantName}/models/{modelName}/dimensions/create:
    post:
      tags:
        - v0
      summary: Create dimension by model name
      operationId: createDimensionByModelName
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dimension"
          description: Измерение создано в модели `modelName`
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Измерение уже существует в модели `modelName`
        "500":
          $ref: "#/components/responses/unexpectedError"
      parameters:
        - $ref: "#/components/parameters/modelName"
        - $ref: "#/components/parameters/tenantName"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dimension"
        description: New dimension
  /api/v0/tenants/{tenantName}/models/{modelName}/dimensions/:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
      tags:
        - v0
      summary: Get dimensions by model name
      operationId: getDimensionsByModelName
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/dimension"
                maxItems: 1000
                uniqueItems: true
          description: Все измерения модели `modelName`
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Get dimensions by model name and dimension name
      operationId: getDimensionsByModelNameAndDimensionsName
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/dimension"
                maxItems: 1000
                uniqueItems: true
          description: Измерения модели `modelName` по списку `dimensionNames`
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        description: Список идентификаторов измерений модели `modelName`
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/dimensionName"
              maxItems: 1000
              uniqueItems: true
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/dimensions/{dimensionName}:
    get:
      tags:
        - v0
      summary: Get dimension by model name and dimension name
      operationId: getDimensionByModelNameAndDimensionName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dimension"
          description: Измерение `dimensionName` модели `modelName`
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Не найдено измерение `dimensionName` модели `modelName`
        "500":
          $ref: "#/components/responses/unexpectedError"
    delete:
      tags:
        - v0
      summary: Delete dimension by model name and dimension name
      operationId: deleteDimensionByModelNameAndDimensionName
      responses:
        "200":
          description: Измерение `dimensionName` модели `modelName` удалено
        "404":
          description: Измерение `dimensionName` модели `modelName` не найдено
        "500":
          $ref: "#/components/responses/unexpectedError"
    patch:
      tags:
        - v0
      summary: Change dimension
      operationId: changeDimensionByModelNameAndDimensionName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dimension"
          description: Измерение `dimensionName` модели `modelName` изменено
        "404":
          content:
            application/json:
