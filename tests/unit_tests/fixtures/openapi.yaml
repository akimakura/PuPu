          $ref: "#/components/schemas/objectLabels"
        precision:
          description: Длина поля
          type: integer
          minimum: 1
          maximum: 1333
        type:
          $ref: "#/components/schemas/dimensionKeyType"
        authorizationRelevant:
          type: boolean
          default: false
          description: Релевантность проверке полномочий
        textsTimeDependency:
          type: boolean
          default: false
          description: Зависимость текстов от времени
        textsLanguageDependency:
          type: boolean
          default: false
          description: Зависимость текстов от языка
