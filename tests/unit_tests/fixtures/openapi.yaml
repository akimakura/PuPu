                type: array
                items:
                  $ref: "#/components/schemas/dataStorage"
                maxItems: 1000
                uniqueItems: true
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Create Data Storage by model name
      operationId: createDataStorageByModelName
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dataStorage"
          description: Data Storage создано в модели `modelName`
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Data Storage уже существует в модели `modelName`
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dataStorage"
        description: New dataStorage
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/dataStorages/byDbObject:
    post:
      tags:
        - v0
      summary: Get dataStorages by model name and databaseObjects
      operationId: getdataStoragesByModelNameAndDataObject
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/dataStorage"
          description: Хранилище данных модели `modelName` по объекту БД
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        description: Объект БД
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/dbObjectForSearch"
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/dataStorages/copyToAnotherModel:
    post:
      tags:
        - v0
      summary: Copy data storages to another model
      operationId: copyDataStoragesToAnotherModel
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/respCopyStorage"
          description: Хранилище данных создано в указанных моделях
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
          description: Хранилище данных уже существует в модели `modelName`
      parameters:
        - $ref: "#/components/parameters/tenantName"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/requestCopyStorage"
        description: New model for data storage
  /api/v0/tenants/{tenantName}/models/{modelName}/composites/:
    get:
      parameters:
        - example: 1
          name: page
          description: Страница (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationPageCount"
          in: query
          required: false
        - example: 20
          name: pageSize
          description: Количество строк (параметр пагинации)
          schema:
            $ref: "#/components/schemas/paginationRowCount"
          in: query
          required: false
        - name: sortDirection
          description: Направление сортировки
          schema:
            $ref: "#/components/schemas/sortDirection"
          in: query
          required: false
      tags:
        - v0
      summary: Get all composites by model name
      operationId: getCompositesByModelName
      responses:
        "200":
          description: Все композиты модели `modelName`
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/compositeGet"
                maxItems: 1000
                uniqueItems: true
        "500":
          $ref: "#/components/responses/unexpectedError"
    post:
      tags:
        - v0
      summary: Create composite by model name
      operationId: createCompositeByModelName
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/compositeGet"
          description: Композит создан в модели `modelName`
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Композит уже существует в модели `modelName`
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/composite"
        description: New composite
    parameters:
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/models/{modelName}/composites/{compositeName}:
    get:
      tags:
        - v0
      summary: Get composite by model name and composite name
      operationId: getCompositeByModelNameAndCompositeName
      responses:
        "200":
          description: Описание композита с именем `compositeName`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/compositeGet"
        "404":
          description: Не найден композит с именем `compositeName`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
        "500":
          $ref: "#/components/responses/unexpectedError"
    delete:
      tags:
        - v0
      summary: Delete composite by model name and composite name
      operationId: deleteCompositeByModelNameAndCompositeName
      responses:
        "200":
          description: Композит `compositeName` в модели `modelName` удален
        "404":
          description: Композит `compositeName` в модели `modelName` не найден
        "500":
          $ref: "#/components/responses/unexpectedError"
    patch:
      tags:
        - v0
      summary: Change composite by model name and composite name
      operationId: changeCompositeByModelNameAndCompositeName
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/compositeGet"
          description: Композит `compositeName` в модели `modelName` изменен
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error"
          description: Композит `compositeName` в модели `modelName` не найден
        "500":
          $ref: "#/components/responses/unexpectedError"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/compositeEdit"
    parameters:
      - $ref: "#/components/parameters/compositeName"
      - $ref: "#/components/parameters/modelName"
      - $ref: "#/components/parameters/tenantName"
  /api/v0/tenants/{tenantName}/composites/copyToAnotherModel:
    post:
      tags:
        - v0
      summary: Copy composite to another model
      operationId: copyCompositeToAnotherModel
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/respCopyObject"
          description: Измерение создано в указанных моделях
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpValidationError"
          description: Измерение уже существует в модел `modelName`
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/requestCopyObject"
      description: New model for measure
    parameters:
      - $ref: "#/components/parameters/tenantName"
components:
  responses:
    unexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/error"
  parameters:
    modelName:
      name: modelName
      description: Уникальный идентификатор модели
      schema:
        $ref: "#/components/schemas/modelName"
      in: path
      required: true
    databaseName:
      name: databaseName
      description: Уникальный идентификатор базы данных
      schema:
        $ref: "#/components/schemas/databaseName"
      in: path
      required: true
    dimensionName:
      name: dimensionName
      description: Уникальный идентификатор измерения
      schema:
        $ref: "#/components/schemas/dimensionName"
      in: path
      required: true
    measureName:
      name: measureName
      description: Уникальный идентификатор показателя
      schema:
        $ref: "#/components/schemas/measureName"
      in: path
      required: true
    compositeName:
      name: compositeName
      description: Уникальный идентификатор композита
      schema:
        $ref: "#/components/schemas/compositeName"
      in: path
      required: true
    dataStorageName:
      name: dataStorageName
      description: Уникальный идентификатор data storage
      schema:
        $ref: "#/components/schemas/dataStorageName"
      in: path
      required: true
    hierarchyName:
      name: hierarchyName
      description: Название иерархии
      schema:
        $ref: "#/components/schemas/hierarchyName"
      in: path
      required: true
    tenantName:
      name: tenantName
      description: Название тенанта
      schema:
        $ref: "#/components/schemas/tenantName"
      in: path
      required: true
    objectName:
      name: objectName
      description: Техническое имя объекта
      schema:
        $ref: "#/components/schemas/objectName64"
      in: path
      required: true
    checkPossibleToDropMode:
      name: checkPossibleToDropMode
      description: Строка для проверки возможности удаления модели
      schema:
        $ref: "#/components/schemas/checkPossibleToDropMode"
      in: query
      required: false
    copyAttributes:
      name: copyAttributes
      description: Копировать с вложенными атрибутами
      schema:
        $ref: "#/components/schemas/copyAttributes"
      in: query
      required: false
    groupId:
      name: groupId
      description: Идентификатор ai группы
      schema:
        $ref: "#/components/schemas/groupId"
      in: path
      required: true
    dataStorageType:
      name: type
      description: Тип хранилища данных
      schema:
        type: array
        maxItems: 100
        uniqueItems: true
        items:
          $ref: "#/components/schemas/dataStorageType"
      in: query
      required: false
  schemas:
    tenantName:
      $ref: "#/components/schemas/objectName32"
    dimensionName:
      $ref: "#/components/schemas/objectName32"
    hierarchyName:
      $ref: "#/components/schemas/objectName32"
    databaseName:
      $ref: "#/components/schemas/objectName32"
    compositeName:
      $ref: "#/components/schemas/objectName32"
    measureName:
      $ref: "#/components/schemas/objectName32"
    dataStorageName:
      $ref: "#/components/schemas/objectName64"
    modelName:
      $ref: "#/components/schemas/objectName32"
    objectName32:
      description: Уникальное техническое имя объекта
      type: string
      minLength: 1
      maxLength: 32
      pattern: "^[a-z0-9_]+$"
      example: "objectname32"
    objectName64:
      description: Уникальное техническое имя объекта
      type: string
      minLength: 1
      maxLength: 64
      pattern: "^[a-z0-9_]+$"
      example: "objectname64"
    objectName255:
      description: Уникальное техническое имя объекта
      type: string
      minLength: 1
      maxLength: 255
      pattern: '^[^\n\t]+$'
      example: "objectname255"
    tenantEdit:
      type: object
      additionalProperties: false
      properties:
        labels:
          $ref: "#/components/schemas/objectLabels"
        models:
          type: array
          items:
            $ref: "#/components/schemas/modelName"
          maxItems: 1000
          uniqueItems: true
    tenant:
      allOf:
        - $ref: "#/components/schemas/tenantEdit"
        - type: object
          required:
            - name
            - models
          additionalProperties: false
          properties:
            name:
              $ref: "#/components/schemas/tenantName"
    dimension:
      allOf:
        - $ref: "#/components/schemas/versionInfo"
        - $ref: "#/components/schemas/dimensionEdit"
        - type: object
          required:
            - name
          additionalProperties: false
          properties:
            name:
              $ref: "#/components/schemas/dimensionName"
            valuesTable:
              $ref: "#/components/schemas/dataStorageName"
            textTable:
              $ref: "#/components/schemas/dataStorageName"
            attributesTable:
              $ref: "#/components/schemas/dataStorageName"
            hierarchyVersionsTable:
              $ref: "#/components/schemas/dataStorageName"
            hierarchyTextVersionsTable:
              $ref: "#/components/schemas/dataStorageName"
            hierarchyNodesTable:
              $ref: "#/components/schemas/dataStorageName"
            hierarchyTextNodesTable:
              $ref: "#/components/schemas/dataStorageName"
            aorType:
              $ref: '#/components/schemas/aorType'
            attributesTimeDependency:
              type: boolean
              default: false
              description: Зависимость атрибутов от времени
            pvDictionary:
              $ref: "#/components/schemas/pvDictionary"
            models:
              type: array
              items:
                $ref: "#/components/schemas/modelName"
              minItems: 0
              maxItems: 1000
              uniqueItems: true
              description: Массив имен моделей, к которым относится измерение со статусом обработки объекта в них
            haveHierarchy:
              type: boolean
              default: false
              description: Наличие иерархии
    schemaName:
      description: Имя схемы базы данных
      type: string
      pattern: "^[a-zA-Z0-9_]+$"
      minLength: 0
      maxLength: 255
      example: "schema_name"
    specificAttribute:
      type: object
      additionalProperties: false
      required:
        - name
        - value
      properties:
        name:
          description: Имя атрибута
          type: string
          example: TYPE
          pattern: "^[A-Z0-9_]+$"
          minLength: 1
          maxLength: 255
        value:
          description: Значение атрибута
          type: string
          example: DICTIONARY
          pattern: '^[a-zA-Z0-9_\-\(\).,]+$'
          minLength: 1
          maxLength: 255
    dimensionAttribute:
      type: object
      required:
        - name
        - type
        - semanticType
      additionalProperties: false
      properties:
        name:
          $ref: "#/components/schemas/objectName32"
        timeDependency:
          type: boolean
          description: Зависимость атрибута от времени
        labels:
          $ref: "#/components/schemas/objectLabels"
        semanticType:
          $ref: "#/components/schemas/semanticType"
        type:
          $ref: "#/components/schemas/objectFieldType"
    anyField:
      type: object
      additionalProperties: false
      properties:
        name:
          $ref: "#/components/schemas/objectName32"
        labels:
          $ref: "#/components/schemas/objectLabels"
        type:
          description: Технический тип данных поля (состоит из типов измерения и показателя)
          maxLength: 20
          enum:
            - INTEGER
            - STRING
            - DATE
            - ARRAY[INTEGER]
            - TIME
            - DATETIME
            - TIMESTAMP
            - BOOLEAN
            - ARRAY[STRING]
            - JSON
            - FLOAT
            - DECIMAL
            - UUID
          type: string
        aggregationType:
          $ref: "#/components/schemas/aggregationType"
        precision:
          description: Overall lenght of data
          type: integer
          minimum: 1
          maximum: 1333
        scale:
          description: Number of digits after fpoint
          type: integer
          minimum: 0
          maximum: 34
    requestCopyObject:
      type: object
      additionalProperties: false
      properties:
        modelNames:
          type: array
          items:
            $ref: "#/components/schemas/modelName"
          maxItems: 1000
          uniqueItems: true
        objects:
          type: array
          items:
            $ref: "#/components/schemas/objectName32"
          maxItems: 1000
          uniqueItems: true
    requestCopyStorage:
      type: object
      additionalProperties: false
      properties:
        modelNames:
          type: array
          items:
            $ref: "#/components/schemas/modelName"
          maxItems: 1000
          uniqueItems: true
        objects:
          type: array
          items:
            $ref: "#/components/schemas/dataStorageName"
          maxItems: 1000
          uniqueItems: true
    respCopyObject:
      type: array
      maxItems: 1000
      uniqueItems: true
      items:
        type: object
        additionalProperties: false
        properties:
          tenant:
            $ref: "#/components/schemas/tenantName"
          objectName:
            $ref: "#/components/schemas/objectName32"
          modelNames:
            type: array
            items:
              $ref: "#/components/schemas/modelName"
            maxItems: 1000
            uniqueItems: true
          result:
            $ref: "#/components/schemas/result"
          comment:
            pattern: '^[^\n\t]+$'
            type: string
            maxLength: 255
            description: Комментарий
    respCopyStorage:
      type: array
      maxItems: 1000
      uniqueItems: true
      items:
        type: object
        additionalProperties: false
        properties:
          tenant:
            $ref: "#/components/schemas/tenantName"
          objectName:
            $ref: "#/components/schemas/objectName64"
          modelNames:
            type: array
            items:
              $ref: "#/components/schemas/modelName"
            maxItems: 1000
            uniqueItems: true
          result:
            type: string
            enum:
              - SUCCESS
              - FAILURE
            description: Результат копирования
          comment:
            pattern: '^[^\n\t]+$'
            type: string
            maxLength: 255
            description: Комментарий
    httpValidationError:
      type: object
      additionalProperties: false
      properties:
        detail:
          type: array
          maxItems: 1000
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            properties:
              loc:
                type: array
                items:
                  type: string
                  maxLength: 255
                  pattern: '^[^\n\t]+$'
                maxItems: 1000
                uniqueItems: true
              msg:
                $ref: "#/components/schemas/msg"
              type:
                type: string
                maxLength: 255
                pattern: '^[^\n\t]+$'
                description: Тип ошибки
    hierarchy:
      allOf:
        - type: object
          additionalProperties: false
          required:
            - name
            - structureType
            - baseDimension
          properties:
            name:
              $ref: "#/components/schemas/hierarchyName"
            pvDictionary:
              $ref: "#/components/schemas/pvDictionary"
            structureType:
              description: |
                Тип структуры иерархии
                - MIXED - расширенная
                - PARENT_CHILD - родитель-потомок
                - FLAT - плоская, линейная
              type: string
              enum:
                - MIXED
                - PARENT_CHILD
                - FLAT
            models:
              type: array
              description: Модели, использующие иерархию, со статусом обработки объекта в нем
              items:
                $ref: "#/components/schemas/modelName"
              maxItems: 1000
              minItems: 0
              uniqueItems: true
            baseDimension:
              $ref: "#/components/schemas/dimensionName"
            dataStorages:
              type: object
              description: Группа таблиц в БД для хранения данных по иерархии
              additionalProperties: false
              required:
                - hierarchyVersionsTable
                - hierarchyTextVersionsTable
                - hierarchyNodesTable
                - hierarchyTextNodesTable
              properties:
                hierarchyVersionsTable:
                  $ref: "#/components/schemas/dataStorageName"
                hierarchyTextVersionsTable:
                  $ref: "#/components/schemas/dataStorageName"
                hierarchyNodesTable:
                  $ref: "#/components/schemas/dataStorageName"
                hierarchyTextNodesTable:
                  $ref: "#/components/schemas/dataStorageName"
        - $ref: "#/components/schemas/hierarchyEdit"
    error:
      required:
        - message
      type: object
      additionalProperties: false
      properties:
        message:
          description: A human readable error message
          type: string
          pattern: "^[a-zA-Z0-9_]+$"
          minLength: 1
          maxLength: 255
    measure:
      allOf:
        - $ref: "#/components/schemas/versionInfo"
        - $ref: "#/components/schemas/measureEdit"
        - required:
            - name
          type: object
          additionalProperties: false
          properties:
            name:
              $ref: "#/components/schemas/measureName"
            aorType:
              $ref: '#/components/schemas/aorType'
            models:
              type: array
              items:
                $ref: "#/components/schemas/modelName"
              maxItems: 1000
              minItems: 0
              uniqueItems: true
              description: Массив имен моделей, к которым относится показатель, со статусом обработки объекта в ней
    dimensionFilter:
      type: object
      additionalProperties: false
      required:
        - dimensionName
      properties:
        dimensionName:
          $ref: "#/components/schemas/dimensionName"
        dimensionValue:
          description: Значение dimension
          type: string
          maxLength: 255
          pattern: "^[a-zA-Z0-9_]+$"
    dataStorageField:
      required:
        - name
        - type
        - isKey
        - semanticType
      type: object
      additionalProperties: false
      properties:
        name:
          $ref: "#/components/schemas/objectName32"
        sqlName:
          $ref: "#/components/schemas/sqlName"
        sqlColumnType:
          $ref: "#/components/schemas/sqlColumnType"
        labels:
          $ref: "#/components/schemas/objectLabels"
        isKey:
          type: boolean
          default: false
          description: Является ли поле ключевым
        isShardingKey:
          type: boolean
          default: false
          description: Является ли поле ключем шардирования (актуально для распределённых таблиц в БД ClickHouse)
        semanticType:
          $ref: "#/components/schemas/semanticType"
        type:
          $ref: "#/components/schemas/objectFieldType"
    objectFieldType:
      description: Тип ссылочного поля
      type: object
      additionalProperties: false
      properties:
        refObjectType:
          description: Тип ссылочного объекта
          type: string
          enum:
            - ANYFIELD
            - DIMENSION
            - MEASURE
        refObject:
          oneOf:
            - $ref: "#/components/schemas/anyField"
            - $ref: "#/components/schemas/objectName32"
    dataStorage:
      allOf:
        - $ref: "#/components/schemas/versionInfo"
        - $ref: "#/components/schemas/dataStorageEdit"
        - type: object
          properties:
            name:
              $ref: "#/components/schemas/dataStorageName"
            aorType:
              $ref: '#/components/schemas/aorType'
            models:
              type: array
              maxItems: 1000
              minItems: 0
              uniqueItems: true
              description: Массив имён моделей, в которых есть dataStorage, со статусом обработки объекта в ней
              items:
                $ref: "#/components/schemas/modelName"
          additionalProperties: false
          required:
            - name
            - type
            - fields
    objectLabels:
      type: array
      maxItems: 100
      uniqueItems: true
      description: |
        Тексты, которые описывают различные сущности системы на разных языках для
          - признаков
          - атрибутов признаков
          - показателей
          - хранилищ данных
          - композитов
          - ...
      items:
        type: object
        additionalProperties: false
        required:
          - language
          - type
        description: Зависимый от языка текст различной длины
        properties:
          language:
            type: string
            maxLength: 5
            description: Язык текста
            example: ru-ru
            pattern: "^[a-z]{2}-[a-z]{2}$"
          type:
            $ref: "#/components/schemas/labelType"
          text:
            type: string
            description: Отображаемый текст
            pattern: '^[^\n\t]+$'
            minLength: 1
            maxLength: 255
    model:
      allOf:
        - $ref: "#/components/schemas/versionInfo"
        - $ref: "#/components/schemas/modelEdit"
        - type: object
          additionalProperties: false
          description: |
            Модель - совокупность 
            - признаков
            - показателей 
            - хранилищ
            - композитов
            - других объектов
            принадлежащей одной области системы
          required:
            - name
            - databaseName
          properties:
            aorType:
              $ref: '#/components/schemas/aorType'
            name:
