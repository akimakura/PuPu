        filter:
          type: array
          description: Список уникальных значений dimension
          items:
            $ref: "#/components/schemas/dimensionFilter"
          maxItems: 100
          uniqueItems: true
    databaseEdit:
      type: object
      additionalProperties: false
      description: Параметры базы данных
      properties:
        type:
          description: Тип базы данных
          type: string
          maxLength: 50
          enum:
            - CLICKHOUSE
            - GREENPLUM
            - POSTGRESQL
        defaultClusterName:
          type: string
