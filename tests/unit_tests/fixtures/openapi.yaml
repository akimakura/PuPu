          type: string
          description: Имя базы данных. Актуально только для БД Postgre и GreenPlum
          pattern: "^[a-zA-Z0-9_-]+$"
          minLength: 1
          maxLength: 255
    modelEdit:
      type: object
      additionalProperties: false
      description: |
        Модель - совокупность 
        - признаков
        - показателей 
        - хранилищ
        - композитов
        - других объектов
        принадлежащей одной области системы
      properties:
        labels:
          $ref: "#/components/schemas/objectLabels"
        databaseName:
          $ref: "#/components/schemas/databaseName"
