          maxLength: 30
          enum:
            - CLICKHOUSE_HTTP
            - CLICKHOUSE_NATIVE
            - POSTGRESQL_V3
        sqlDialect:
          type: string
          description: SQL диалект порта
          maxLength: 30
          enum:
            - CLICKHOUSE
            - GREENPLUM
            - POSTGRESQL
