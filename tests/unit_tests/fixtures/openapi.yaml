        domainId:
          type: integer
          description: Отчет / область (для расширения функционала ассистента в Q4, выбор среди нескольких отчетов)
          minimum: 1
          maximum: 2147483647
          example: 1
        groupId:
          $ref: "#/components/schemas/groupId"
        vectorSearch:
          type: boolean
          default: false
          description: Флаг присутствия в ВБД (можем искать значение аналитики и использовать в фильтре)
          example: false
        fallbackToLlmValues:
          type: boolean
          default: false
          description: Флаг отката к значениям LLM
          example: false
        preferableColumn:
          type: boolean
          default: false
          description: Размещаем в столбце или в строке (default=false аналитика в столбец)
          example: false
        groupDescriptions:
          $ref: "#/components/schemas/aiGroupEdit"
        analyticDescriptions:
          type: object
          description: Группа описаний для измерения
          additionalProperties: false
          properties:
            entityName:
              $ref: "#/components/schemas/entityName"
            description:
              $ref: "#/components/schemas/description"
            synonyms:
              $ref: "#/components/schemas/synonyms"
            fewShots:
              $ref: "#/components/schemas/fewShots"
    entityName:
      $ref: "#/components/schemas/objectName255"
    description:
      type: string
      minLength: 1
      maxLength: 8192
      pattern: '^[^\n\t]+$'
      example: Иерархическая или функциональная система управления, включающая отделы, департаменты, подразделения и руководящие должности, которая определяет распределение обязанностей, полномочий и взаимодействие внутри компании
    synonyms:
      type: string
      description: Cинонимичные или связанные фразы/выражения
      minLength: 1
      maxLength: 8192
      pattern: '^[^\n\t]+$'
      example: БФ
    fewShots:
      type: string
      description: Примеры фраз и идентификаций
      minLength: 1
      maxLength: 8192
      pattern: '^[^\n\t]+$'
      example: Покажи расходы по блокам -> по блокам
    informationCategory:
      type: string
      description: Категория информации
      enum:
        - K1
        - K2
        - K3
        - K4
    groupId:
      type: integer
      description: Идентификатор группы, к которой принадлежит измерение
      minimum: 1
      maximum: 2147483647
      example: 1
    aiGroup:
      allOf:
        - type: object
          required:
            - groupId
          additionalProperties: false
          properties:
            groupId:
              $ref: "#/components/schemas/groupId"
        - $ref: "#/components/schemas/aiGroupEdit"
    aiGroupEdit:
      type: object
      description: Параметры AI группы
      additionalProperties: false
      properties:
        entityName:
          $ref: "#/components/schemas/entityName"
        description:
          $ref: "#/components/schemas/description"
        synonyms:
          $ref: "#/components/schemas/synonyms"
        fewShots:
          $ref: "#/components/schemas/fewShots"
    aiGroupNew:
      type: object
      description: Параметры новой AI группы
      additionalProperties: false
      required:
        - entityName
      properties:
        entityName:
          $ref: "#/components/schemas/entityName"
        description:
          $ref: "#/components/schemas/description"
        synonyms:
          $ref: "#/components/schemas/synonyms"
        fewShots:
          $ref: "#/components/schemas/fewShots"
    hierarchyNew:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          $ref: "#/components/schemas/hierarchyName"
        structureType:
          description: |
            Тип структуры иерархии
            - MIXED - расширенная
            - PARENT_CHILD - родитель-потомок
            - FLAT - плоская, линейная
          type: string
          enum:
            - MIXED
            - PARENT_CHILD
            - FLAT
        labels:
          $ref: "#/components/schemas/objectLabels"
        additionalDimensions:
          type: array
          description: Дополнительные (не базовые) измерения иерархии
          uniqueItems: true
          maxItems: 1000
          items:
            $ref: "#/components/schemas/dimensionName"
        defaultHierarchy:
          type: boolean
          default: false
          description: Признак базовой иерархии для справочника.
        isVersioned:
          type: boolean
          default: false
          description: Версионируемость
        isTimeDependent:
          type: boolean
          default: false
          description: Зависимость от времени
        timeDependencyType:
          type: string
          enum:
            - WHOLE
            - NODE
          description: |
            Тип зависимости от времени
            - WHOLE - зависит вся иерархия
            - NODE - только узлы
        defaultExpansion:
          type: integer
          minimum: 1
          maximum: 99
          description: Начальный уровень развертки
          default: 3
        aggregationType:
          description: |
            Тип агрегации:
            - 'NONE' - без агрегации,
            - 'SUM' - суммирование,
            - 'AVG' - расчет среднего значения
          type: string
          enum:
            - NONE
            - SUM
            - AVG
          default: SUM
        inputOnNodes:
          type: boolean
          default: false
          description: Разрешить ввод на узлы.
    modelStatus:
      type: object
      description: Модель со статусом обработки объекта в ней
      additionalProperties: false
      required:
        - name
      properties:
        name:
          $ref: "#/components/schemas/modelName"
        status:
          $ref: "#/components/schemas/result"
        msg:
          $ref: "#/components/schemas/msg"
    result:
      description: Результат
      type: string
      enum:
        - SUCCESS
        - PENDING
        - FAILURE
    msg:
      type: string
      maxLength: 8192
      minLength: 1
      description: Сообщение
      example: Комментарий
    objectStatus:
      type: object
      additionalProperties: false
      properties:
        modelName:
          $ref: "#/components/schemas/objectName32"
        schemaName:
          $ref: "#/components/schemas/schemaName"
        objectName:
          $ref: "#/components/schemas/objectName64"
        objectType:
          $ref: "#/components/schemas/objectType"
        status:
          $ref: "#/components/schemas/result"
        msg:
          $ref: "#/components/schemas/msg"
    respObjectStatus:
      type: object
      additionalProperties: false
      properties:
        modelName:
          $ref: "#/components/schemas/objectName32"
        schemaName:
          $ref: "#/components/schemas/schemaName"
        objectName:
          $ref: "#/components/schemas/objectName64"
        objectType:
          $ref: "#/components/schemas/objectType"
        status:
          $ref: "#/components/schemas/result"
        updated:
          type: boolean
          description: Маркер обновления данных (статуса) в БД
        msg:
          $ref: "#/components/schemas/msg"
    objectType:
      type: string
      description: Тип объекта БД
      enum:
        - DIMENSION
        - MEASURE
        - DATA_STORAGE
        - COMPOSITE
        - DATABASE_OBJECT
        - HIERARCHY
        - PV_DICTIONARY
    dimensionValues:
      type: object
    pagination:
      description: Объект пагинации
      type: object
      additionalProperties: false
      properties:
        page:
          $ref: "#/components/schemas/paginationPageCount"
        pageSize:
          $ref: "#/components/schemas/paginationRowCount"
        total:
          description: Общее количество страниц
          type: integer
          minimum: 1
          maximum: 1333
        totalRows:
          description: Общее количество строк
          type: integer
          minimum: 1
          maximum: 1333
      required:
        - page
        - pageSize
        - total
        - totalRows
    valuesDimensionResponse:
      type: object
      additionalProperties: false
      description: Вывод значений справочника
      properties:
        bk:
          type: string
          example: "10039140"
          maxLength: 255
          pattern: '^[^\n\t]+$'
          description: Значение бизнес-ключа
        texts:
          type: array
          maxItems: 10000
          description: Текстовые значения
          items:
            type: object
            additionalProperties: false
            properties:
              dateTo:
                type: string
                description: Дата окончания текста
                example: "2026-01-12"
                maxLength: 255
                pattern: '^[^\n\t]+$'
              dateFrom:
                type: string
                description: Дата начала текста
                example: "2025-01-12"
                maxLength: 255
                pattern: '^[^\n\t]+$'
              language:
                type: string
                description: Язык текста
                example: "R"
                maxLength: 5
                pattern: '^[^\n\t]+$'
              txtLong:
                type: string
                description: Длинный текст
                example: "HR Сопровождение"
                maxLength: 1333
                pattern: '^[^\n\t]+$'
              txtMedium:
                type: string
                description: Средний текст
                example: "HR Сопровождение"
                maxLength: 40
                pattern: '^[^\n\t]+$'
              txtShort:
                type: string
                description: Короткий текст
                example: "163.12D"
                maxLength: 20
                pattern: '^[^\n\t]+$'
    aorType:
      description: Тип объекта в AOR
      type: string
      enum:
        - sl_model
        - sl_hierarchy
        - sl_dimension
        - sl_measure
        - sl_datastorage
        - sl_databaseobject
        - sl_composite
        - sl_database
        - sl_aigroup
      example: sl_dimension
    uuid:
      description: идентификатор
      type: string
      format: uuid
    valuesFiltersRequest:
      type: object
      description: Фильтры
      additionalProperties: false
      properties:
        includeBlocks:
          type: array
          maxItems: 3
          description: Выбор блока справочника - Бизнес-ключи / Тексты справочника / Атрибуты
          items:
            type: string
            enum:
              - "BKS"
              - "TEXTS"
              - "ATTRIBUTES"
          example:
            - "BKS"
            - "ATTRIBUTES"
        controlDateOrPeriod:
          oneOf:
            - type: string
              maxLength: 255
              pattern: '^[^\n\t]+$'
              description: Контрольная дата
              example: "2025-04-05"
            - type: object
              properties:
                from:
                  type: string
                  maxLength: 255
                  pattern: '^[^\n\t]+$'
                  description: Дата начала периода
                  example: "2025-04-01"
                  default: "1900-01-01"
                to:
                  type: string
                  maxLength: 255
                  pattern: '^[^\n\t]+$'
                  description: Дата окончания периода
                  example: "2025-12-31"
                  default: "2299-12-31"
    version:
      description: Версия объекта
      type: integer
      minimum: 1
      maximum: 2147483647
      example: 6
    versionAor:
      description: Версия объекта в AOR
      type: string
      maxLength: 2147483647
      pattern: ^[0-9a-zA-Z\.\-_]+$
      example: "6"
    timestamp:
      type: string
      description: Дата и время
      example: "2025-05-06 18:16:15.690"
    user:
      type: string
      description: Пользователь
      pattern: ^[^\n\t]+$
      example: EPMSuperUser
    deleted:
      description: Маркер удаления
      type: boolean
      example: false
    versionInfo:
      description: Все версии объекта без имени
      type: object
      properties:
        version:
          $ref: "#/components/schemas/version"
        updatedAt:
          $ref: "#/components/schemas/timestamp"
        updatedBy:
          $ref: "#/components/schemas/user"
