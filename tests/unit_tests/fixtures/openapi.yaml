          uniqueItems: true
        valueAttributes:
          type: array
          items:
            $ref: "#/components/schemas/dimensionAttribute"
          maxItems: 1000
          uniqueItems: true
        caseSensitive:
          type: boolean
          default: false
          description: Зависимость значений от регистра
        dataAccessMethod:
          type: string
          description: Метод доступа к данным
          pattern: "^[A-Z0-9_]+$"
          minLength: 1
          maxLength: 255
        businessKeyRepresentation:
          type: string
          description: Отображение бизнес-ключа
          pattern: "^[A-Z0-9_]+$"
          minLength: 1
          maxLength: 255
        isVirtual:
          type: boolean
          default: false
          description: Виртуальное измерение
        aiPrompt:
          $ref: "#/components/schemas/aiPrompt"
    measureEdit:
      type: object
      additionalProperties: false
      properties:
        labels:
          $ref: "#/components/schemas/objectLabels"
        measureRef:
          $ref: "#/components/schemas/measureName"
        type:
          $ref: "#/components/schemas/measureKeyType"
        precision:
          description: При изменении только в сторону увеличения
          type: integer
          minimum: 1
          maximum: 34
          default: 0
        scale:
          description: При изменении только в сторону увеличения, актуально для типа данных Decimal
          type: integer
          minimum: 0
          maximum: 34
